profiles:
  prpl-template:
    platform: prpl
    prompt_regex: ".*# $"
    login_regex: "(?mi)^login:\\s*$"
    password_regex: "(?mi)^password:\\s*$"
    ready_probe: "echo __READY__${nonce}; whoami"
    uart:
      baud: 115200
      data_bits: 8
      parity: N
      stop_bits: 1
      flow_control: none
      xonxoff: false

targets:
  - act_no: 1
    com: COM0
    alias: default+1
    profile: prpl-template
    device_by_id: /dev/serial/by-id/target0
