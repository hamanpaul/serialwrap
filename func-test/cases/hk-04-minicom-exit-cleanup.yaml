---
meta:
  name: hk-04-minicom-exit-cleanup
  category: human-key
  severity: high
  description: "Console detach 正確釋放 interactive ownership，agent 不再被阻擋"
  tags: ["console", "raw-interactive", "cleanup"]

target:
  platform: prpl
  boot_banner: "boot done\r\nroot@prplOS:/# "
  noise:
    enabled: false
  commands:
    default: "EXEC:{cmd}\r\nRESULT:{cmd}:OK\r\nroot@prplOS:/# "

profile:
  prompt_regex: '(?m)^root@prplOS:.*# '
  ready_probe: 'echo __READY__${nonce}'
  timeout_s: 15

steps:
  - action: wait_ready
    timeout_s: 20

  # Human attach（取得 interactive）
  - action: attach_console
    selector: COM0
    label: hk-cleanup
    save_as: con

  - action: assert_state
    selector: COM0
    expect:
      state: "READY"
      has_interactive: true

  # Human detach（釋放 interactive）
  - action: detach_console
    console_id: "{con.client_id}"
    selector: COM0

  - action: assert_state
    selector: COM0
    expect:
      state: "READY"
      has_interactive: false

  # Agent 命令不再被 INTERACTIVE_BUSY 阻擋
  - action: cli
    argv: ["cmd", "submit", "--selector", "COM0", "--cmd", "echo free", "--source", "agent:cleanup-test"]
    expect:
      ok: true
      has_keys: ["cmd_id"]
    save_as: submit1

  - action: wait_command_done
    cmd_id: "{submit1.cmd_id}"
    timeout_s: 10

  - action: cli
    argv: ["cmd", "get", "--cmd-id", "{submit1.cmd_id}"]
    expect:
      ok: true
    save_as: result1

  - action: assert_state
    selector: COM0
    expect:
      state: "READY"
